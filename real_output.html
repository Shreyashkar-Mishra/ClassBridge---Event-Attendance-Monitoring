<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>ClassBridge</title>
    <!-- We can put our CSS styling here ONCE and it applies everywhere! -->
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
        }

        .navbar {
            background-color: #2c3e50;
            padding: 15px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
            font-weight: bold;
        }

        .container {
            width: 80%;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>

    <!-- This Navigation Bar will show up on EVERY page automatically! -->
    <div class="navbar">
        <h2>ClassBridge</h2>
        <div>
            
            <a href="/accounts/login/">Login</a>
            
        </div>
    </div>

    <!-- THIS IS THE MAGIC HOLE -->
    <div class="container">
        
<div style="text-align: center;">
    <h1 style="color: #2c3e50;">Welcome, Ananya!</h1>
    <hr style="width: 50%;">

    <p style="font-size: 1.2em;">You are logged in as a <strong>Coordinator</strong>.</p>

    <div
        style="background-color: #ecf0f1; display: inline-block; padding: 20px 40px; border-radius: 8px; margin-top: 20px;">
        <p style="margin: 0; color: #7f8c8d; font-size: 0.9em;">Managing Batch</p>
        <p style="margin: 5px 0 0 0; font-weight: bold; font-size: 1.5em; color: #8e44ad;">{{
            coordinator_profile.assigned_batch }}</p>
    </div>

    <br><br><br>

    <div style="display: flex; justify-content: center; gap: 20px;">
        <a href="/events/create/"
            style="background-color: #27ae60; color: white; padding: 12px 25px; text-decoration: none; border-radius: 4px; font-weight: bold;">Create
            a New Event</a>
        <a href="/events/"
            style="background-color: #3498db; color: white; padding: 12px 25px; text-decoration: none; border-radius: 4px; font-weight: bold;">View
            All Events</a>
    </div>
</div>

    </div>

</body>

</html>
