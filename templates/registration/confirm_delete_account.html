{% extends 'base.html' %}
{% block content %}
<div class="max-w-2xl mx-auto py-12 px-4">
    <div class="bg-white rounded-3xl shadow-xl border border-red-100 overflow-hidden">
        <div class="bg-red-50 px-8 py-10 text-center border-b border-red-100">
            <div class="mx-auto w-20 h-20 bg-white rounded-2xl flex items-center justify-center mb-6 shadow-sm border border-red-100">
                <svg class="w-10 h-10 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            </div>
            <h2 class="text-3xl font-serif font-bold text-red-900 tracking-tight mb-4">Delete Academic Account?</h2>
            <p class="text-red-700 font-medium max-w-md mx-auto">This action is permanent. All your student records, logs, and associated data will be erased from the ClassBridge portal.</p>
        </div>
        <div class="p-10 flex flex-col sm:flex-row gap-4 justify-center bg-white">
            <a href="{% url 'dashboard' %}" class="inline-flex items-center justify-center px-8 py-3 border border-slate-200 text-sm font-bold rounded-xl text-slate-700 bg-white hover:bg-slate-50 transition-all shadow-sm">Cancel, Take Me Back</a>
            <form action="{% url 'delete_account' %}" method="POST">
                {% csrf_token %}
                <button type="submit" class="w-full inline-flex items-center justify-center px-8 py-3 border border-transparent shadow-lg text-sm font-bold rounded-xl text-white bg-red-600 hover:bg-red-700 transition-all hover:-translate-y-0.5">Yes, Permanently Delete My Account</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
