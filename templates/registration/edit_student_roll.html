{% extends 'base.html' %}
{% block content %}
<div class="max-w-2xl mx-auto py-12 px-4">
    <div class="bg-white rounded-3xl shadow-xl border border-navy-100 overflow-hidden">
        <div class="bg-navy-900 px-8 py-10 text-white relative">
            <div class="absolute top-0 right-0 w-32 h-32 bg-gold-600 rounded-full blur-3xl -mr-16 -mt-16 opacity-20"></div>
            <h2 class="text-3xl font-serif font-bold tracking-tight mb-2">Edit Student Profile</h2>
            <p class="text-navy-300 font-medium">Updating administrative records for {{ student.user.get_full_name }}</p>
        </div>
        
        <div class="p-8 sm:p-10">
            <form method="POST" class="space-y-8">
                {% csrf_token %}
                
                <div>
                    <label for="roll_number" class="block text-xs font-bold text-navy-900 uppercase tracking-widest mb-3">Academic Roll Number</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-navy-400 group-focus-within:text-burgundy-600 transition-colors">
                            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path>
                            </svg>
                        </div>
                        <input type="text" name="roll_number" id="roll_number" value="{{ student.roll_number }}" required 
                               class="block w-full pl-11 pr-4 py-4 border-2 border-navy-100 rounded-2xl text-navy-900 font-bold focus:ring-0 focus:border-burgundy-600 transition-all bg-navy-50/30 focus:bg-white sm:text-lg">
                    </div>
                    <p class="mt-3 text-sm text-slate-500 font-medium">Ensure the roll number matches the official college register.</p>
                </div>

                <div class="flex flex-col sm:flex-row gap-4 pt-4">
                    <button type="submit" 
                            class="flex-1 inline-flex justify-center items-center px-8 py-4 border border-transparent text-base font-bold rounded-2xl text-white bg-navy-900 hover:bg-navy-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-navy-900 shadow-lg shadow-navy-100 transition-all hover:-translate-y-0.5">
                        Save Changes
                    </button>
                    <a href="{% url 'dashboard' %}" 
                       class="flex-1 inline-flex justify-center items-center px-8 py-4 border-2 border-navy-100 text-base font-bold rounded-2xl text-navy-700 bg-white hover:bg-navy-50 transition-all decoration-0">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
